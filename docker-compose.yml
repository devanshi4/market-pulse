version: '3.8'

networks:
  market_pulse_network:
    driver: bridge

services:

  # ── Postgres ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: market_pulse_postgres
    networks:
      - market_pulse_network
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=4"
      - "-c"
      - "max_wal_senders=4"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka (KRaft mode) ─────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: market_pulse_kafka
    networks:
      - market_pulse_network
    ports:
      - "29092:29092"
    environment:
      KAFKA_NODE_ID:                                1
      KAFKA_PROCESS_ROLES:                          broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS:               1@kafka:29093
      CLUSTER_ID:                                   MkU3OEVBNTcwNTJENDM2Qk

      # Listeners and advertised listeners:
      KAFKA_LISTENERS:                              PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS:                   PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:         PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME:             PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES:              CONTROLLER

      # Replication — 1 because we only have one broker locally
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:       1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR:          1
      KAFKA_DEFAULT_REPLICATION_FACTOR:             1
      KAFKA_MIN_INSYNC_REPLICAS:                    1

      KAFKA_AUTO_CREATE_TOPICS_ENABLE:              "true"
      KAFKA_LOG_RETENTION_HOURS:                    168
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Kafka Connect + Debezium ───────────────────────────────────────────────
  kafka-connect:
    image: debezium/connect:2.4
    container_name: market_pulse_connect
    networks:
      - market_pulse_network
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS:                        kafka:9092
      GROUP_ID:                                 market_pulse_connect_group
      CONFIG_STORAGE_TOPIC:                     market_pulse_connect_configs
      OFFSET_STORAGE_TOPIC:                     market_pulse_connect_offsets
      STATUS_STORAGE_TOPIC:                     market_pulse_connect_status
      CONFIG_STORAGE_REPLICATION_FACTOR:        1
      OFFSET_STORAGE_REPLICATION_FACTOR:        1
      STATUS_STORAGE_REPLICATION_FACTOR:        1
      KEY_CONVERTER:                            org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER:                          org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE:             "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE:           "false"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Kafka UI ───────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: market_pulse_kafka_ui
    networks:
      - market_pulse_network
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME:                        market-pulse-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS:            kafka:9092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME:         debezium
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS:      http://kafka-connect:8083
    restart: unless-stopped

volumes:
  postgres_data:
  kafka_data: